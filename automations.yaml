- id: '1757753649313'
  alias: Luyen is Home
  description: ''
  triggers:
    - entity_id:
        - person.luyen
      to: home
      trigger: state
  conditions: []
  actions:
    - action: notify.mobile_app_glenn_s_iphone_15_pro
      data:
        title: Luyen Tracking
        message: Luyen is home
  mode: single

- id: '1757755104316'
  alias: Luyen has left
  description: ''
  triggers:
    - entity_id:
        - person.luyen
      from: home
      trigger: state
  conditions: []
  actions:
    - action: notify.mobile_app_glenn_s_iphone_15_pro
      data:
        title: Luyen Tracking
        message: Luyen has left
  mode: single

- id: '1757797917654'
  alias: Garage – Driveway snapshot (webhook)
  description: ''
  triggers:
    - trigger: webhook
      allowed_methods:
        - POST
        - PUT
      local_only: true
      webhook_id: driveway-motion-mqtt
  conditions: []
  actions:
    - action: notify.mobile_app_glenn_s_iphone_15_pro
      metadata: {}
      data:
        message: Movement in driveway
        title: Movement detected
        data:
          entity_id: camera.driveway
  mode: single

- id: '1758005044168'
  alias: Mobile action → Close Garage
  description: ''
  triggers:
    - event_type: ios.notification_action_fired
      event_data:
        actionName: CLOSE_GARAGE
      trigger: event
  conditions: []
  actions:
    - action: script.garage_close_now
      data: {}
  mode: single

- id: '1759040963334'
  alias: Master Bedroom Switch → Toggle Blinds
  description: ''
  triggers:
    - trigger: mqtt
      topic: zigbee2mqtt/Master Bedroom Blinds Switch
  conditions:
    - condition: template
      value_template: >-
        {{ trigger.payload_json is defined
           and 'action' in trigger.payload_json
           and trigger.payload_json.action not in [none, '', 'null'] }}
  actions:
    - choose:
        - conditions:
            - condition: numeric_state
              entity_id: cover.master_bedroom_left_blind
              attribute: current_position
              above: 50
          sequence:
            - action: cover.close_cover
              target:
                entity_id:
                  - cover.master_bedroom_left_blind
                  - cover.master_bedroom_right_blind
              data: {}
      default:
        - action: cover.set_cover_position
          target:
            entity_id:
              - cover.master_bedroom_left_blind
              - cover.master_bedroom_right_blind
          data:
            position: 100
  mode: single

- id: '1768807954725'
  alias: Energy — Daily Amber delay + grid export summary (email)
  description: >-
    Daily email (yesterday, local time) listing every Amber interval
    (feed-in + import) with effective vs HA-received time + delay,
    plus Sigenergy RM bucket sums + deltas.
  triggers:
    - trigger: time
      at: '06:30:00'
  conditions: []
  actions:
    - action: notify.email_glenn_energy_summary
      data:
        title: 'Amber + Sigenergy Daily Summary — {{ now().strftime(''%A %d %B %Y'') }}'
        message: |
          {% set yesterday = (now() - timedelta(days=1)).strftime('%Y-%m-%d') %}
          
          == AMBER FEED-IN INTERVALS ({{ yesterday }}) ==
          
          {% set ns = namespace(rows=[]) %}
          {% set query_fit = "
            SELECT
              to_char(effective_at AT TIME ZONE 'Australia/Melbourne', 'HH24:MI') AS eff,
              to_char(ha_received_at AT TIME ZONE 'Australia/Melbourne', 'HH24:MI:SS') AS rcv,
              EXTRACT(EPOCH FROM (ha_received_at - effective_at))::int AS delay_s,
              ROUND(price_kwh::numeric, 2) AS price
            FROM amber_prices
            WHERE interval_type = 'FeedIn'
              AND DATE(effective_at AT TIME ZONE 'Australia/Melbourne') = '" ~ yesterday ~ "'
            ORDER BY effective_at
          " %}
          {% set result_fit = state_attr('sensor.pg_amber_feed_in_intervals', 'query_result') or [] %}
          {% for r in result_fit %}
          {{ r.eff }} | rcv {{ r.rcv }} | delay {{ r.delay_s }}s | {{ r.price }} c/kWh
          {% endfor %}
          
          == AMBER IMPORT INTERVALS ({{ yesterday }}) ==
          
          {% set query_imp = "
            SELECT
              to_char(effective_at AT TIME ZONE 'Australia/Melbourne', 'HH24:MI') AS eff,
              to_char(ha_received_at AT TIME ZONE 'Australia/Melbourne', 'HH24:MI:SS') AS rcv,
              EXTRACT(EPOCH FROM (ha_received_at - effective_at))::int AS delay_s,
              ROUND(price_kwh::numeric, 2) AS price
            FROM amber_prices
            WHERE interval_type = 'Import'
              AND DATE(effective_at AT TIME ZONE 'Australia/Melbourne') = '" ~ yesterday ~ "'
            ORDER BY effective_at
          " %}
          {% set result_imp = state_attr('sensor.pg_amber_import_intervals', 'query_result') or [] %}
          {% for r in result_imp %}
          {{ r.eff }} | rcv {{ r.rcv }} | delay {{ r.delay_s }}s | {{ r.price }} c/kWh
          {% endfor %}
          
          == SIGENERGY RIEMANN SUM BUCKETS ==
          
          Grid Export:  {{ states('sensor.sigen_0_grid_sensor_export_energy_sum') }} kWh
          Grid Import:  {{ states('sensor.sigen_0_grid_sensor_import_energy_sum') }} kWh
          Battery Chg:  {{ states('sensor.sigen_0_battery_charging_energy_sum') }} kWh
          Battery Dis:  {{ states('sensor.sigen_0_battery_discharging_energy_sum') }} kWh
          PV Yield:     {{ states('sensor.sigen_0_pv_total_yield_energy_sum') }} kWh
          Consumed:     {{ states('sensor.sigen_0_consumed_energy_sum') }} kWh
  mode: single
