# Revision: 3.0
# Last Updated: 2026-01-29
# 
# CHANGES IN THIS REVISION:
#   - Removed all Kitchen Scene Switch automations (moved to packages/kitchen_lighting.yaml)
#   - Removed helper sync automations (no longer needed)
#   - Removed gate/failsafe automations (no longer needed)
#
# PREVIOUSLY REMOVED (in packages/sigenergy.yaml):
#   - All Sigenergy/Amber automations
#
# CURRENT CONTENTS:
#   - Luyen tracking (is Home, has left)
#   - Garage automations (snapshot webhook, mobile close action)
#   - Master Bedroom Switch (toggle blinds)
