- id: '1755182929932'
  alias: Luyen is Home
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - device_tracker.luyen_s_s10
    from: not_home
    to: home
  conditions: []
  actions:
  - action: notify.mobile_app_glenns_iphone
    metadata: {}
    data:
      title: Device joined Wi-Fi
      message: '{{ state_attr(trigger.entity_id,''friendly_name'') or trigger.entity_id }} connected at {{ now().strftime(''%-I:%M %p'') }}.'
  mode: single
- id: '1755183154978'
  alias: Luyen has left
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - device_tracker.luyen_s_s10
    from: home
    to: not_home
    for:
      hours: 0
      minutes: 1
      seconds: 0
  conditions: []
  actions:
  - action: notify.mobile_app_glenns_iphone
    metadata: {}
    data:
      message: '{{ state_attr(trigger.entity_id,''friendly_name'') or trigger.entity_id }} left Wi-Fi at {{ now().strftime(''%-I:%M %p'') }}.'
      title: Luyen has left
  mode: single
- id: '1756188348768'
  alias: Garage – Driveway snapshot (webhook)
  description: ''
  triggers:
  - trigger: webhook
    allowed_methods:
    - POST
    - PUT
    local_only: true
    webhook_id: garage_driveway_snap
  conditions: []
  actions:
  - action: camera.snapshot
    target:
      entity_id: camera.driveway_telephoto_fluent
    data:
      filename: /config/www/snap/driveway.jpg
  - action: notify.mobile_app_glenns_iphone
    data:
      title: Garage Door Left Open
      message: '{{ trigger.json.reason | default(''Garage event'') }}'
      data:
        data:
          image: http://glennmc.asuscomm.com:31111/local/snap/driveway.jpg?ts={{ now().timestamp()|int }}
          url: /lovelace/driveway
          clickAction: /lovelace/driveway
          tag: garage_notify
  mode: single
- id: '1756188813198'
  alias: Mobile action → Close Garage
  description: ''
  triggers:
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      Key: action
      Value: GARAGE_CLOSE
  conditions: []
  actions:
  - action: rest_command.garage_close_now
    data: {}
  - action: notify.mobile_app_glenns_iphone
    data:
      message: Closing garage…
      data:
        tag: garage_notify
  mode: single
