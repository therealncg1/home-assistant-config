- id: '1759134079606'
  alias: Dining Scene Switch — Single Press (Toggle 75% / All Off)
  description: ''
  triggers:
  - trigger: mqtt
    topic: zigbee2mqtt/Dining Scene Switch – 1G/action
    payload: single
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: script.scene_movie_time_kitchen_dining_ha
        state: 'on'
      sequence:
      - action: script.turn_off
        target:
          entity_id: script.scene_movie_time_kitchen_dining_ha
      - delay:
          milliseconds: 200
      - action: input_boolean.turn_off
        target:
          entity_id:
          - input_boolean.kitchen_bench_dn_desired_on
          - input_boolean.kitchen_sink_dn_desired_on
      - action: light.turn_off
        target:
          entity_id:
          - light.kitchen_ceiling_light_white
          - light.kitchen_ceiling_light_rgb
          - light.kitchen_downlight_sink
          - light.kitchen_downlight_bench_hall
          - light.kitchen_downlight_bench_window
        data:
          transition: 3
      - choose:
        - conditions:
          - condition: state
            entity_id: input_boolean.dining_ring_prestage_needed
            state: 'on'
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.dining_rings
            data:
              color_temp_kelvin: 2702
              brightness_pct: 1
              transition: 0
          - delay:
              milliseconds: 200
      - parallel:
        - action: light.turn_on
          target:
            entity_id: light.dining_whites
          data:
            color_temp_kelvin: 2702
            brightness_pct: 75
            transition: 3
        - action: light.turn_on
          target:
            entity_id: light.dining_rings
          data:
            color_temp_kelvin: 3400
            brightness_pct: 100
            transition: 3
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.dining_ring_prestage_needed
    default:
    - choose:
      - conditions:
        - condition: and
          conditions:
          - condition: state
            entity_id: light.dining_door_light_white
            state: 'off'
          - condition: state
            entity_id: light.dining_hall_light_white
            state: 'off'
          - condition: state
            entity_id: light.dining_door_light_rgb
            state: 'off'
          - condition: state
            entity_id: light.dining_hall_light_rgb
            state: 'off'
        sequence:
        - parallel:
          - target:
              entity_id: light.dining_whites
            data:
              color_temp_kelvin: 2702
              brightness_pct: 75
              transition: 3
            action: light.turn_on
          - target:
              entity_id: light.dining_rings
            data:
              color_temp_kelvin: 3400
              brightness_pct: 100
              transition: 3
            action: light.turn_on
        - target:
            entity_id: input_boolean.dining_ring_prestage_needed
          action: input_boolean.turn_off
      default:
      - choose:
        - conditions:
          - condition: state
            entity_id: input_boolean.dining_ring_prestage_needed
            state: 'on'
          sequence:
          - target:
              entity_id: light.dining_rings
            data:
              color_temp_kelvin: 2702
              brightness_pct: 1
              transition: 0
            action: light.turn_on
          - delay:
              milliseconds: 200
      - target:
          entity_id:
          - light.dining_whites
          - light.dining_rings
        data:
          transition: 3
        action: light.turn_off
      - target:
          entity_id: input_boolean.dining_ring_prestage_needed
        action: input_boolean.turn_off
  mode: single
