# =============================================================================
# HOME ASSISTANT CONFIGURATION
# =============================================================================
# File: configuration.yaml
# Revision: 2.0
# Last Updated: 2026-01-28
# Changes: Added packages directory for Sigenergy/Amber management
# =============================================================================

# ========== Core ==========
default_config:

# ========== Packages ==========
# All Sigenergy/Amber energy management is now in packages/
homeassistant:
  packages: !include_dir_named packages/

tts:
  - platform: google_translate

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Templates are now split into multiple files (see /config/templates/)
# NOTE: Sigenergy/Amber templates have been moved to packages/sigenergy.yaml
# Delete amber_*.yaml and sigenergy_*.yaml from /config/templates/ after migration
template: !include_dir_merge_list templates

# ========== Recorder ==========
recorder:
  purge_keep_days: 365
  commit_interval: 3
  db_url: postgresql://home-assistant:img2mem@192.168.1.200:5434/home-assistant?sslmode=disable

# ========== HTTP ==========
http:
  server_port: 31111

# ========== Modbus (SolarEdge) ==========
modbus:
  - name: solaredge
    type: tcp
    host: 192.168.1.7
    port: 1502
    sensors:
      - name: Export Limit (W)
        address: 40177
        data_type: uint16
        unit_of_measurement: "W"
        scan_interval: 30
      - name: Export Limit Enabled Flag
        address: 40178
        data_type: uint16
        unit_of_measurement: ""
        scan_interval: 30
      - name: Max AC Power Limit (W)
        address: 40092
        data_type: uint16
        unit_of_measurement: "W"
        scan_interval: 30
      - name: Active Power Limit (%)
        address: 40086
        data_type: uint16
        unit_of_measurement: "%"
        scan_interval: 30

# ========== REST Commands ==========
rest_command:
  # -------------------------------
  # Hubitat Maker API (App ID 190) — token confirmed
  # -------------------------------

  # Read device (debug/verification)
  hubitat_read_device:
    url: "http://192.168.1.20/apps/api/190/devices/{{ device_id }}?access_token=bb4acea9-7060-4632-a2ba-b7c7e03763cf"
    method: get
    timeout: 10

  # Generic ON / OFF via POST JSON (keep for devices that accept it)
  hubitat_on:
    url: "http://192.168.1.20/apps/api/190/devices/{{ device_id }}?access_token=bb4acea9-7060-4632-a2ba-b7c7e03763cf"
    method: post
    content_type: "application/json"
    payload: >
      {"command":"on"}
    timeout: 10

  hubitat_off:
    url: "http://192.168.1.20/apps/api/190/devices/{{ device_id }}?access_token=bb4acea9-7060-4632-a2ba-b7c7e03763cf"
    method: post
    content_type: "application/json"
    payload: >
      {"command":"off"}
    timeout: 10

  # setLevel(level[, durationSeconds]) — JSON POST variant (handy elsewhere)
  hubitat_set_level:
    url: "http://192.168.1.20/apps/api/190/devices/{{ device_id }}?access_token=bb4acea9-7060-4632-a2ba-b7c7e03763cf"
    method: post
    content_type: "application/json"
    payload: >
      {% if duration is defined %}
      {"command":"setLevel","value":{{ level|int }},"secondaryValue":{{ duration|int }}}
      {% else %}
      {"command":"setLevel","value":{{ level|int }}}
      {% endif %}
    timeout: 10

  # setColorTemperature(kelvin[, level[, durationSeconds]])
  hubitat_set_ct:
    url: "http://192.168.1.20/apps/api/190/devices/{{ device_id }}?access_token=bb4acea9-7060-4632-a2ba-b7c7e03763cf"
    method: post
    content_type: "application/json"
    payload: >
      {% if level is defined and duration is defined %}
      {"command":"setColorTemperature","value":{{ kelvin|int }},"secondaryValue":{{ level|int }},"thirdValue":{{ duration|int }}}
      {% elif level is defined %}
      {"command":"setColorTemperature","value":{{ kelvin|int }},"secondaryValue":{{ level|int }}}
      {% else %}
      {"command":"setColorTemperature","value":{{ kelvin|int }}}
      {% endif %}
    timeout: 10

  # Garage momentary via App 190 (POST)
  garage_close_now:
    url: "http://192.168.1.20/apps/api/190/devices/118?access_token=bb4acea9-7060-4632-a2ba-b7c7e03763cf"
    method: post
    content_type: "application/json"
    payload: >
      {"command":"on"}
    timeout: 10

  # -------------------------------
  # Kitchen Ceiling Light mirror VSWs (path-style GET)
  # Main = device 147, Ring = device 148
  # -------------------------------
  hubitat_vsw_main_on:
    url: "http://192.168.1.20/apps/api/190/devices/147/on?access_token=bb4acea9-7060-4632-a2ba-b7c7e03763cf"
    method: get
    timeout: 10

  hubitat_vsw_main_off:
    url: "http://192.168.1.20/apps/api/190/devices/147/off?access_token=bb4acea9-7060-4632-a2ba-b7c7e03763cf"
    method: get
    timeout: 10

  hubitat_vsw_ring_on:
    url: "http://192.168.1.20/apps/api/190/devices/148/on?access_token=bb4acea9-7060-4632-a2ba-b7c7e03763cf"
    method: get
    timeout: 10

  hubitat_vsw_ring_off:
    url: "http://192.168.1.20/apps/api/190/devices/148/off?access_token=bb4acea9-7060-4632-a2ba-b7c7e03763cf"
    method: get
    timeout: 10

  # -------------------------------
  # Hubitat Group OFF/ON (exact IDs)
  # Kitchen Downlights — All = 149, Lounge Downlights — All = 121
  # -------------------------------
  hubitat_kitchen_downlights_off:
    url: "http://192.168.1.20/apps/api/190/devices/149/off?access_token=bb4acea9-7060-4632-a2ba-b7c7e03763cf"
    method: get
    timeout: 10
  hubitat_lounge_downlights_off:
    url: "http://192.168.1.20/apps/api/190/devices/121/off?access_token=bb4acea9-7060-4632-a2ba-b7c7e03763cf"
    method: get
    timeout: 10
  hubitat_kitchen_downlights_on:
    url: "http://192.168.1.20/apps/api/190/devices/149/on?access_token=bb4acea9-7060-4632-a2ba-b7c7e03763cf"
    method: get
    timeout: 10
  hubitat_lounge_downlights_on:
    url: "http://192.168.1.20/apps/api/190/devices/121/on?access_token=bb4acea9-7060-4632-a2ba-b7c7e03763cf"
    method: get
    timeout: 10

  # -------------------------------
  # Local endpoint (Hubitat Rule Machine) to do native smooth fades
  # -------------------------------
  hubitat_movie_time_fade_downlights_endpoint:
    url: "http://192.168.1.20/apps/api/192/trigger?access_token=57a370aa-faf7-4f97-9745-f650e83de9ff"
    method: get
    timeout: 10

# ========== Notify (Email) ==========
notify:
  - platform: smtp
    name: email_glenn_energy_summary
    server: !secret smtp_server
    port: !secret smtp_port
    timeout: 15
    sender: !secret smtp_sender
    encryption: starttls
    username: !secret smtp_username
    password: !secret smtp_password
    recipient:
      - !secret smtp_recipient
    sender_name: "Home Assistant"
