# =============================================================================
# SIGENERGY ENERGY MANAGEMENT PACKAGE
# =============================================================================
# File: packages/sigenergy.yaml
# Revision: 3.2
# Last Updated: 2026-01-28
# 
# CHANGES IN 3.2:
#   - Fixed email line breaks using <br> tags in HTML
#   - All times now use local timezone (Australia/Melbourne via as_local())
#   - Added note about later updates being in daily email
#
# CHANGES IN 3.1:
#   - Removed template sensors for amber prices (conflict with templates folder)
#   - Uses raw sensors directly: sensor.glenn_home_feed_in_price ($/kWh)
#
# COLOR CODING:
#   - Green (#137333 / #E6F4EA): I am exporting now!
#   - Red (#D93025 / #FCE8E6): I have stopped exporting!
#   - Orange (#E37400 / #FFF4E5): I am charging the battery!
#   - Blue (#1A73E8 / #E8F0FE): I have stopped charging the battery!
#
# RAW SENSOR REFERENCE:
#   - sensor.glenn_home_feed_in_price = $/kWh (multiply by 100 for c/kWh)
#   - sensor.glenn_home_general_price = $/kWh (multiply by 100 for c/kWh)
#   - input_number.sigenergy_export_threshold = $/kWh (0.033 = 3.3c)
# =============================================================================

